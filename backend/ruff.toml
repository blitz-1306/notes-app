line-length = 100
target-version = "py311"
extend-exclude = [".venv", "alembic/versions"]

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line too long — formatter handles it
    "B008",  # function call in default arg — FastAPI's Depends(...) pattern
]

[lint.per-file-ignores]
"tests/*" = ["B018"]

[format]
quote-style = "double"
